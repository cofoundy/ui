  - lib/atelier-registry.ts existe como SSOT registry
  - AGENTS.md auto-generado desde build script (verificable: rm AGENTS.md + run script + git diff vacío)
  - 2 Storybook stories nuevas + 7 audit-updated
  - **Coverage ≥80%** sobre src/components/docs/ + src/lib/atelier-registry.ts (Vitest --coverage report)
  - **QA visual:** Chrome MCP screenshot diff por componente storybook ≤2% pixel delta vs baseline
  - XGodel MDX v1 (5 docs) renderea sin warnings/errors en dev + prod
  - **Deploy:** packages/ui PR mergea a main + docs-ai PR mergea a main + Cloudflare Worker auto-deploya + /canary-monitor verde por ventana de 30 min post-deploy
  - **Post-deploy validation:** Lighthouse ≥90 sobre /client/xgodel/* (5 docs), axe-core a11y clean, smoke test E2E para los 5 URLs
  - Andre share URL con John Medina dentro 48h post-merge + John responde engagement
  - cycle_completed_at <ISO> registered en cto-loop.yaml

