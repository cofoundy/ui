scope:
  done_definition: |
    XGodel client portal renderea /client/xgodel/{propuesta, cotizacion, cronograma,
    personas, brand-moodboard} con Deliverable chrome (CTO #2 provee) + componentes
    Atelier desde @cofoundy/ui/docs/. Cada componente exportado con Zod prop schema +
    Storybook story + entry en ATELIER_COMPONENTS registry. AGENTS.md auto-generado
    desde registry build script. PR mergea a packages/ui main; follow-up PR a docs-ai
    main agrega single import + spread en mdx-components.tsx.

  out_of_scope:
    - ContractTimeline (XGodel sin contrato firmado, excluded per Andre 2026-05-16)
    - UserFlow, MockupShowcase, DeployRecord, PersonaGrid, TimelineGantt,
      FaqAccordion, HandoffChecklist, BeforeAfterSlider (defer al segundo cliente)
    - 10 hard-floor gates production (parten con artifact-render skill, Atelier M1)
    - artifact-render skill itself (XGodel v1 = MDX manual authoring)
    - Promotion a otros design-system targets (focus en @cofoundy/ui/docs/)

  mvp_scope:
    components_new:
      - { name: Sitemap, source: ~/cofoundy/projects/xgodel-landing/research/07-information-architecture.md, atelier_spec: "Tree/graph de páginas con depth, intent, nav grouping" }
      - { name: QuoteCard, source: ~/cofoundy/deals/clients/XGodel/propuesta.html, atelier_spec: "Cotización pretty-render con hitos table, totals, payment terms" }
    components_audit_and_patch:
      - { name: PersonaCard, source: ~/cofoundy/deals/clients/XGodel/ux-research/02-user-personas.md, gap: "props existentes no incluyen jtbd/objections/journey_stage del spec Atelier §6.2" }
      - { name: MoodBoard, source: ~/cofoundy/deals/clients/XGodel/visual-design/concept-*, gap: "verificar fit con concepts A/B/C/D + final" }
      - { name: BuildProgress, source: ~/cofoundy/deals/clients/XGodel/cronograma.tex + Vikunja delivery_project_id=22, gap: "verificar phase model L0-L9 vs phase actual de XGodel" }
      - { name: ComparisonMatrix, source: ~/cofoundy/deals/clients/XGodel/ux-research/competitive-research, gap: "audit shape" }
      - { name: KPIBoard, source: ~/cofoundy/projects/xgodel-landing/research/16-cro-plan.md, gap: "audit shape" }
      - { name: DesignSystemPanel, source: ~/cofoundy/deals/clients/XGodel/work/brand-paletas-v2/, gap: "audit token-display shape" }
      - { name: TestimonialCard, source: deferred (XGodel sin testimonials públicos todavía), gap: "audit y skip render para XGodel v1" }
    infra:
      - lib/atelier-registry.ts (TypeScript Record<string, Component>)
      - scripts/gen-atelier-agents-md.ts (build script → AGENTS.md auto-export del registry)
      - Zod schemas por componente (props validation runtime + DX)
      - Storybook stories nuevas (Sitemap, QuoteCard) + audit-update de las 7 existentes

