      MetadataCard/NextStepCallout/ScopeList son del mail/email skill,
      útiles tangencialmente (recipient-block alternativo).

  external_research_referenced:
    - ~/cofoundy/products/atelier/research/track-a/R-A7-portal-documentation-ux-2026.md
    - ~/cofoundy/products/atelier/research/track-a/R-A8-md-component-compiler-patterns.md
    - ~/cofoundy/products/atelier/PRD.md §6.2 + §7 (artifact-render)
    - ~/cofoundy/products/cofoundy-platform/docs-ai/PRD.md §V2.1 ("Atelier IS DocsAI" decision)

architecture_decisions_locked:
  d1_location: |
    packages/ui/src/components/docs/ (NO docs-ai/components/atelier/).
    DocsAI PRD V2.1 decisión 2026-05-13 "Atelier IS DocsAI" override al
    Atelier PRD §6.2 "first pass docs-ai, promote later". Ventajas:
    cero substrate collision con CTO #2, Storybook auto, reusable en
    landing-pages futuros.

  d2_no_gates_in_this_cycle: |
    10 hard-floor gates DIFERIDOS a artifact-render skill (Atelier M1).
    Razón: gates protegen agent-emitted content. Sin artifact-render,
    autoría MDX manual por humano = revisión humana ES el gate. Zod
    prop schemas SÍ se incluyen (cheap, valor inmediato).

  d3_no_atelier_subfolder: |
    NO crear packages/ui/src/components/atelier/. Los Atelier-domain
    components viven en docs/ junto a los existentes (consistencia con
    estado actual + AuthorNote/MetadataCard etc. son tangencialmente
    Atelier-style).

  d4_audit_before_patch: |
    Antes de tocar los 7 existentes, audit cada uno contra Atelier §6.2
    spec. Output: matriz por componente {props_actuales, props_spec,
    delta, plan}. Solo después patch.

interrogation:
  q1_done_in_90d: |
    XGodel portal renderiza /client/xgodel/{5 docs} con Deliverable chrome
    + componentes Atelier funcionando. Andre comparte URL con John
    Medina, John responde con engagement (no solo "ok").

  q2_real_user: |
    Cliente final visible: John Medina (XGodel cofundador). Operador
    inmediato: Andre dogfoodea, Percy review visual. Consumidor de mi
    registry: CTO #2 (chrome) + futuro artifact-render skill.

  q3_painful_workflow: |
    XGodel tiene 13 ux-research docs + 17 research files + brand v2 +
    cotización + cronograma — todo invisible al cliente. Hoy ve solo PDF
    propuesta + WhatsApp + URL landing. Cero portal. Resto del trabajo
    de profundidad estratégica = invisible.

  q4_already_tried: |
    docs-ai V2.1 shipped 32 componentes genéricos (StatCard, BarChart,
    etc.). Sirven para reports internos, NO específicos para portal de
    cliente con personas/IA/moodboard. 7 ya existen en packages/ui pero
    sin Zod schemas + sin registry + sin uso en docs-ai todavía.

  q5_failure_risk: |
    Drift entre Atelier PRD §6.2 spec y componentes existentes (props no
    calzan con shape real de ux-research artifacts) → component existe
    pero unusable. Mitigación: D4 (audit antes de patch).

  q6_reframe_check: |
    Reframe alternativa: "saltarse Atelier components y usar solo V2.1
    generic primitives (Callout + MetadataCard + table) para XGodel".
    Rechazado: undersella portal, no diferencia vs Mintlify, no resuelve
    central commercial gap del Atelier PRD §1.

constraints:
  timeline: "5-7 días wall-clock (audit + 2 new + registry + AGENTS.md + storybook)"
  iron_rule: |
    Andre es CTO, no IC. Dispatch via Agent tool / TeamCreate.
    IC exceptions únicas: Phase 1 substrate (este file), Phase 10 docs/bitácora.
  serialization_with_cto2: |
    Mi PR a docs-ai/mdx-components.tsx (single import+spread line) merge
    DESPUÉS del PR de CTO #2 (chrome). Mi PR a packages/ui main puede
    merge cualquier momento (sin dependencias).

