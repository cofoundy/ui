name: verify-agents-md

# Drift gate: AGENTS.md is auto-generated from src/lib/atelier-registry.ts.
# This workflow fails if a PR edits the registry without regenerating AGENTS.md.
#
# To fix a failure: run `npm run gen:agents` and commit the diff.

on:
  pull_request:
    paths:
      - 'src/lib/atelier-registry.ts'
      - 'src/lib/atelier-schemas.ts'
      - 'src/components/docs/*.schema.ts'
      - 'scripts/gen-atelier-agents-md.ts'
      - 'AGENTS.md'
      - 'package.json'
  push:
    branches:
      - main
    paths:
      - 'src/lib/atelier-registry.ts'
      - 'src/lib/atelier-schemas.ts'
      - 'src/components/docs/*.schema.ts'
      - 'scripts/gen-atelier-agents-md.ts'
      - 'AGENTS.md'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate AGENTS.md
        run: npm run gen:agents

      - name: Check for drift
        run: |
          if ! git diff --exit-code AGENTS.md; then
            echo ""
            echo "::error::AGENTS.md is out of date with the Atelier registry."
            echo "::error::Run \`npm run gen:agents\` and commit updated AGENTS.md."
            exit 1
          fi
